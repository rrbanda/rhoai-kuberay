apiVersion: ray.io/v1
kind: RayJob
metadata:
  name: rayjob-pytorch-cifar10
  namespace: ray-demo
  labels:
    kueue.x-k8s.io/queue-name: default
spec:
  submissionMode: K8sJobMode
  shutdownAfterJobFinishes: true
  ttlSecondsAfterFinished: 600
  runtimeEnvYAML: |
    pip:
      - torch==2.5.1
      - torchvision==0.20.1
    env_vars:
      PIP_EXTRA_INDEX_URL: "https://download.pytorch.org/whl/cu121"
  entrypoint: |
    python -c "
    import ray

    ray.init()

    @ray.remote(num_gpus=1)
    def train_model():
        import torch
        import torch.nn as nn
        import torch.optim as optim
        from torchvision import datasets, transforms

        print(f'GPU available: {torch.cuda.is_available()}')
        if torch.cuda.is_available():
            print(f'GPU device: {torch.cuda.get_device_name(0)}')
            print(f'GPU memory: {torch.cuda.get_device_properties(0).total_memory / 1e9:.1f} GB')
        device = torch.device('cuda' if torch.cuda.is_available() else 'cpu')
        print(f'Training on: {device}')

        transform = transforms.Compose([
            transforms.ToTensor(),
            transforms.Normalize((0.5, 0.5, 0.5), (0.5, 0.5, 0.5))
        ])

        trainset = datasets.CIFAR10(root='/tmp/data', train=True, download=True, transform=transform)
        trainloader = torch.utils.data.DataLoader(trainset, batch_size=128, shuffle=True, num_workers=0)

        model = nn.Sequential(
            nn.Conv2d(3, 32, 3, padding=1), nn.ReLU(), nn.MaxPool2d(2),
            nn.Conv2d(32, 64, 3, padding=1), nn.ReLU(), nn.MaxPool2d(2),
            nn.Flatten(),
            nn.Linear(64 * 8 * 8, 256), nn.ReLU(),
            nn.Linear(256, 10)
        ).to(device)

        criterion = nn.CrossEntropyLoss()
        optimizer = optim.Adam(model.parameters(), lr=0.001)

        for epoch in range(3):
            running_loss = 0.0
            correct = 0
            total = 0
            for i, (inputs, labels) in enumerate(trainloader):
                inputs, labels = inputs.to(device), labels.to(device)
                optimizer.zero_grad()
                outputs = model(inputs)
                loss = criterion(outputs, labels)
                loss.backward()
                optimizer.step()
                running_loss += loss.item()
                _, predicted = outputs.max(1)
                total += labels.size(0)
                correct += predicted.eq(labels).sum().item()

            acc = 100. * correct / total
            avg_loss = running_loss / len(trainloader)
            print(f'Epoch {epoch+1}/3 - Loss: {avg_loss:.4f} - Accuracy: {acc:.2f}%')

        return f'Training complete. Final accuracy: {acc:.2f}%'

    result = ray.get(train_model.remote())
    print(result)
    print('SUCCESS: PyTorch CIFAR-10 GPU training completed!')
    "
  rayClusterSpec:
    rayVersion: '2.47.1'
    headGroupSpec:
      rayStartParams:
        dashboard-host: '0.0.0.0'
        num-cpus: '0'
      template:
        spec:
          containers:
            - name: ray-head
              image: quay.io/modh/ray:2.47.1-py311-cu121
              resources:
                limits:
                  cpu: "1"
                  memory: "4Gi"
                requests:
                  cpu: "100m"
                  memory: "2Gi"
    workerGroupSpecs:
      - replicas: 1
        groupName: gpu-workers
        rayStartParams: {}
        template:
          spec:
            tolerations:
              - key: "nvidia.com/gpu"
                operator: "Exists"
                effect: "NoSchedule"
            containers:
              - name: ray-worker
                image: quay.io/modh/ray:2.47.1-py311-cu121
                resources:
                  limits:
                    cpu: "2"
                    memory: "8Gi"
                    nvidia.com/gpu: "1"
                  requests:
                    cpu: "500m"
                    memory: "4Gi"
                    nvidia.com/gpu: "1"
